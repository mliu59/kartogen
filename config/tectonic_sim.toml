# =========================================================================
# tectonic_sim — physics-only config for the rigid-polygon, cell-grid plate
# tectonics simulation. Knows nothing about hex grids or climate. Kartogen
# references this via `tectonic_sim_config` in kartogen.toml and passes in
# the world rectangle; the domain is not configured here.
# =========================================================================

# --- Plate population ---
plate_count = 20
continental_fraction = 0.6
motion_speed_kmpy = 18.0
seed_radial_bias = 0.0               # 0 = uniform, >0 = centre, <0 = edge

# --- Sim duration ---
n_ticks = 100                        # × dt_myr = total geological time
dt_myr = 2.0

# --- Initial crust thicknesses (km) ---
continental_thickness_km = 35.0
oceanic_thickness_km = 9.0
rift_thickness_km = 33.0             # thinned crust filling continental rift gaps

# --- Half-space cooling (oceanic floor depth) ---
# depth = ridge_depth_km + ridge_subsidence_rate · √age_myr, capped at max.
ridge_depth_km = 2.5
ridge_subsidence_rate = 0.35
max_ocean_depth_km = 4.0

# --- Continental isostasy ---
# elevation_km = (thickness - reference) · isostasy_factor
continental_reference_thickness_km = 35.0
continental_isostasy_factor = 0.15

sea_level_km = 0.0                   # passive sampling threshold; below = ocean

# --- Collision ---
# Fraction of the loser plate's crust transferred to the over-rider per C-C
# fold event. With folding_loser_side_ratio must be <= 1 (rest subducts).
folding_ratio = 0.3

# --- C-C fold-and-thrust belt (over-rider side) ---
# Over-rider mass spreads inland across a belt via a hybrid plateau profile:
# low at suture → half-cosine ramp → flat plateau → cosine taper. Weights
# normalise so total mass = folding_ratio · loser_thick whatever the shape
# (broad orogenic plateau, not a spike). ramp+taper >= depth collapses the
# plateau; both 0 = flat top-hat.
folding_belt_depth_km = 200.0
folding_belt_ramp_km = 40.0
folding_belt_taper_km = 60.0

# --- Loser-side C-C fold belt (Himalayan foothill) ---
# Narrower, sharper mirror deposit one cell into the loser's interior;
# loser gains folding_loser_side_ratio · loser_thick, decaying over decay_km.
folding_loser_side_ratio = 0.2
folding_belt_loser_depth_km = 50.0
folding_belt_loser_decay_km = 15.0

# --- Velocity damping ---
# Per tick: velocity *= (1 - velocity_damping_strength × contested_fraction).
velocity_damping_strength = 0.1
# C-C contested cells damp at strength × this, so colliding continents arrest
# convergence faster than C-O/O-O. 1.0 disables the extra C-C damping.
cc_velocity_damping_multiplier = 10.0

# --- Erosion ---
# Every erosion_period ticks, blend thickness toward k-NN same-plate
# neighbours by erosion_strength. 0 disables.
erosion_period = 10
erosion_strength = 0.05

# --- Snapshot capture (drift animation) ---
# Capture a frame every N ticks; 0 disables. Larger = fewer GIF frames +
# faster export (palette conversion is costly). 1 = smoothest.
snapshot_period_ticks = 5

# --- Rotation-pivot recentering ---
# Re-snap each plate's rotation pivot onto its body centroid every N ticks
# (world-preserving). 1 = every tick; larger = cheaper; 0 disables.
recenter_period_ticks = 5


# =========================================================================
# Per-cell physics tunables (Voronoi seeding, kinematics, contention,
# momentum, fusion, accretion, hotspots, rifting, buoyancy, alpha-complex).
# =========================================================================

# --- Initial speed variation ---
# Per-plate speed ~ Uniform(init_speed_min_ratio · motion_speed_kmpy,
# motion_speed_kmpy). 0 = slowest plate stationary.
init_speed_min_ratio = 0.5

# --- Plate area density (optional override) ---
# When > 0, plate_count is derived as ceil(domain_area / this) and the
# absolute plate_count above is ignored. 0 = use absolute plate_count.
plate_area_per_plate_km2 = 0.0

# --- Plate rotation ---
# Initial ω ~ Uniform(±max). 0 disables. 0.01 rad/Myr ≈ 0.57°/Myr.
init_angular_velocity_max_rad_per_myr = 0.005
# Per-tick angular damping multiplier on top of velocity_damping_strength.
angular_damping_multiplier = 5.0

# --- Inelastic momentum exchange (per-pair impulse) ---
# Restitution 0 = perfectly inelastic, 1 = elastic. Lithospheres ~inelastic.
momentum_restitution = 0.0
# Contact-fraction boost before the per-tick impulse cap, so small plates
# aren't slowly chewed away by large ones. 0 disables.
momentum_contact_boost = 5.0

# --- Plate fusion (small-into-big merge) ---
# Fraction of the smaller plate's cells that must overlap before fusing.
# 0 disables.
fusion_overlap_threshold = 0.1
# Only continental-continental pairs fuse when true (oceanic subducts).
fusion_both_continental_only = true
# Velocity gate (km/Myr): weld only once the contact-normal relative velocity
# has dropped to <= this — couples fusion to momentum convergence rather than
# fusing on first mask overlap. Separating pairs always pass.
fusion_max_relative_velocity_kmpy = 3.0

# --- Continental arc accretion (C-O magmatism) ---
# Per-tick probability each C-O boundary cell triggers an arc event. 0 disables.
accretion_prob_per_boundary_per_tick = 0.02
accretion_cells_per_event = 1        # oceanic→continental cells per event
# Inland offset (km) ~ Uniform(min, max) along the overrider's −velocity;
# randomised to break the parallel-line streak artifact.
accretion_inland_offset_min_km = 8.0
accretion_inland_offset_max_km = 41.0

# --- Rifting (probabilistic plate splits) ---
# DISABLED (0.0) under the continuous-pose architecture — body-frame split
# not yet implemented. When > 0, splits the largest eligible plate
# (>= rift_min_plate_cells) into diverging halves.
rift_prob_per_tick = 0.0
rift_min_plate_cells = 200
rift_divergence_ratio = 0.1          # each half ±(ratio × motion_speed) along rift normal

# --- Volcanic hotspots (mantle plumes) ---
hotspot_density_per_km2 = 1e-6       # ~Earth order of magnitude
hotspot_erupt_prob_per_tick = 0.20   # per active plume; spaces islands along a chain
hotspot_thickness_bump_km = 5.0      # added per eruption above continental_thickness_km
hotspot_island_radius_km = 12.0      # disk radius per stamp; 0 = single cell
hotspot_birth_stagger_ticks = 50     # birth ~ Uniform(±this); negatives back-stamped at t=0
hotspot_lifespan_mean_ticks = 50.0   # lifespan ~ Normal(mean, std), clamped >= 1
hotspot_lifespan_std_ticks = 20.0


# =========================================================================
# Polygon-sim tunables (single source of truth; formerly module constants).
# =========================================================================

# --- Cell-grid resolution ---
# (gy, gx) derived from (domain, target_cell_km). Smaller = finer + costlier.
target_cell_km = 8.3

# --- Translation speed cap ---
# Per-plate translation cap as a fraction of min(sim_w, sim_h)/total_time.
# The bridge uses this to derive motion_speed_kmpy from the sim domain.
translation_speed_ratio = 0.5

# --- Fragment culling ---
# Connected components >= this many cells spawn as a new plate; smaller
# fragments redistribute to a continental neighbour. Higher suppresses
# NN-aliasing fragment bursts at seams / rotated boundaries.
fragment_spawn_threshold = 30

# --- Alpha-complex polygon extraction ---
# Circumradius cutoff = alpha_factor × cell_km for plate-outline rendering.
alpha_factor = 1.8

# --- Contention resolution ---
# Continental cell priority multiplier (50 = a continental plate ties a
# 50×-larger oceanic plate).
crust_continental_weight = 50.0

# --- Buoyancy (young-oceanic thickness bonus) ---
# Per-render bonus on young oceanic cells, decaying to 0 at max age.
buoyancy_bonus_frac = 0.25
max_buoyancy_age_myr = 80.0

# --- Continental absorption threshold ---
# Continental cells thinned below this (km) transfer to a same-plate
# neighbour and revert to oceanic. 0 disables.
min_continental_thickness_km = 10.0

# --- Divergent-gap fill: continental-basin override ---
# A gap whose surround is mostly continental fills as a continental basin
# instead of oceanic ridge (the C-C suture interior).
#   continental_threshold — fraction of the classified surround that must be
#     continental. 0.8 = strict; 1.0 disables (always oceanic).
#   basin_depth_km — basin floor this many km below the surround's mean
#     continental thickness; clamped at min_continental_thickness_km. 0 = flush.
divergent_fill_continental_threshold = 0.8
divergent_fill_basin_depth_km = 5.0

# --- Naturalised Voronoi (domain warp + power weights) ---
# Warp displaces cell positions before nearest-seed lookup → wavy boundaries.
voronoi_warp_amplitude_km = 60.0
voronoi_warp_sigma_cells = 8.0
voronoi_warp_jaggedness = 0.3        # high-frequency overlay on the warp; 0 disables
voronoi_warp_jagged_sigma_cells = 2.0
# Power weights (log-normal, km): high-weight seeds win more territory.
voronoi_weight_sigma = 0.3
voronoi_weight_scale_km = 60.0

# --- Initial thickness variation ---
# Per-plate baseline multiplier exp(N(0, sigma)). 0 disables.
init_thickness_per_plate_sigma = 0.05

# --- Continental relief (Perlin fBm "ancient basement topography") ---
# Per-cell zero-mean km perturbation on continental cells (mass-preserving per
# plate). Thin spots → shelves/seas/straits, thick spots stand proud; combined
# with the passive sea_level_km knob, one run yields a family of geographies.
# 0 amplitude disables.
#   amplitude_km  — perturbation std-dev (~5 km dips to shelf; 8 km cuts straits).
#   wavelength_km — base feature scale (1500 = broad basins; 400 = islands).
#   octaves       — fractal depth; persistence — per-octave amplitude falloff.
continental_relief_amplitude_km = 10.0
continental_relief_wavelength_km = 1500.0
continental_relief_octaves = 4
continental_relief_persistence = 0.5

# --- Edge smoothing (non-physics) ---
# Perlin-alpha-weighted Gaussian blur of thickness at t=0 and t=final only
# (independent Perlin draws): thickness = (1-α)·thickness + α·blur.
#   apply_t0 / apply_tfinal — per-pass on/off.
#   kernel_km     — Gaussian sigma (km).
#   alpha_min/max — blend bounds (0 keeps sharp, 1 fully blurred).
#   noise_*       — Perlin alpha field scale / depth.
edge_smoothing_apply_t0 = true
edge_smoothing_apply_tfinal = true
edge_smoothing_kernel_km = 25.0
edge_smoothing_alpha_min = 0.0
edge_smoothing_alpha_max = 0.7
edge_smoothing_noise_wavelength_km = 600.0
edge_smoothing_noise_octaves = 3
edge_smoothing_noise_persistence = 0.5
# Boundary boost: extra alpha = peak · exp(-d_km / falloff_km), d = distance
# to nearest plate-boundary cell. peak 0 disables.
edge_smoothing_boundary_boost_peak = 0.4
edge_smoothing_boundary_falloff_km = 30.0
