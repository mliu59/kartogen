# -------------------------------------------------------------------------
# Resource deposits — natural resources distributed by per-resource Perlin
# noise gated by biome / elevation / climate.
#
# feature_wavelength_km — district size; coal ~250 km, salt ~50 km.
# abundance              — fraction of *eligible* tiles that host a deposit.
# mean_quantity          — average deposit yield (abstract units).
# elevation_quantity_bonus — multiplier added to quantity per unit elevation.
# category               — informational tag ("ore" / "fuel" / "evaporite" /
#                          "building" / "sedimentary" / "timber").
#
# Climate gates default to (-inf, inf) — set them only where the resource
# genuinely needs hot/dry/cool conditions (e.g. salt evaporites).
# -------------------------------------------------------------------------

[worldgen.resources.iron]
host_biomes = ["mountain", "hills", "plains"]
min_elevation = 0.02
max_elevation = 1.0
min_temperature_c = -40.0
max_temperature_c = 50.0
min_precipitation_mm = 0.0
max_precipitation_mm = 10000.0
feature_wavelength_km = 120.0
abundance = 0.08
mean_quantity = 4.0
elevation_quantity_bonus = 1.0
category = "ore"

