# =========================================================================
# Worldgen parameters — terrain generation pipeline.
#
# Tuning surface for the world-generation pipeline (elevation, climate,
# hydrology, biome thresholds).
#
# Layered pipeline (each layer is a pure function of earlier layers' outputs
# plus a seeded child-RNG keyed by the layer name — adding a new layer or
# entry does not reshuffle existing seeds):
#   L1 elevation → L2 sea → L3 climate → L4 precip → L5 hydrology → L6 biome
#
# Physical-unit scaling: scale-dependent parameters are stored in physical
# units (km, km², mm) and converted via `hex_size_km` — the same physical
# world looks identical at any chosen hex resolution.
# =========================================================================

[worldgen]
# Each hex represents a piece of land of this physical size.
# Scale-dependent parameters below (wavelengths, ocean pickup, river
# threshold, etc.) are given in physical units and converted to hex units
# at runtime — so changing hex_size_km automatically rescales noise
# frequencies, river thresholds, wind reach, and precipitation rates.
# Generated worlds will look the same at any chosen resolution.
hex_size_km = 5.0

[worldgen.world]
# Rectangular map footprint in km. The world hex set is every hex whose
# flat-top pixel centre falls in the rectangle [-W/2, W/2] × [-H/2, H/2].
# Width is the east-west extent (latitude is unchanged across it);
# height is the north-south extent (latitude varies across it; see
# [worldgen.climate] map_lat_min / map_lat_max).
width_km = 1000.0
height_km = 1000.0

# =========================================================================
# Elevation-layer parameters. The macro structure comes from the
# time-stepped tectonics simulation seeded by the [worldgen.elevation.plates]
# table; fBm/ridged noise contributes small-scale detail blended in at
# `tectonic_blend_weight`. (The preset system that used to live here is
# disabled — only this single configuration is supported for now.)
# =========================================================================

[worldgen.elevation]
feature_wavelength_km = 260.0
noise_octaves = 6
noise_lacunarity = 2.0
noise_persistence = 0.5
warp_strength_km = 25.0
warp_wavelength_km = 333.0
ridge_octaves = 5
ridge_amplitude = 0.70
ridge_threshold = 0.10
tectonic_blend_weight = 1.0

[worldgen.elevation.plates]
# Continent-spanning world: every plate seeded as continental so the
# baseline never drops to deep oceanic. Interior oceans / seas instead
# emerge from rift fill + low continental basins — those feed the
# prevailing-wind moisture sweep, without which continental interiors
# bottom out at the precipitation floor.
count = 4
continental_fraction = 1.0          # everything is continental → no ocean baseline
min_separation_km = 700.0
seed_radial_bias = 0.0
boundary_warp_strength_km = 70.0
boundary_warp_wavelength_km = 320.0
motion_speed = 1.0
convergence_threshold = 0.10

[worldgen.climate]
# Latitude window the map covers. The pixel-y axis maps to a slice of
# latitude: y = -height/2 (north edge) → map_lat_max, y = +height/2
# (south edge) → map_lat_min. This is independent of width_km and
# hex_size_km — you can simulate a 1000-km-wide map spanning 1° or 60° of
# latitude alike. Defaults (-90, 90) reproduce the pole-to-pole gradient.
# For a mid-latitude slice (e.g., a Europe-shaped continent) try
# map_lat_min = 30, map_lat_max = 60.
map_lat_min = -30.0
map_lat_max = 60.0

# Planet-wide climate anchors: equator_temp_c is the temperature at lat 0°,
# polar_temp_c at ±90°. The map samples a slice of this gradient via the
# lat window above. lapse rate is then applied per km of elevation.
equator_temp_c = 28.0
polar_temp_c = -22.0
lapse_rate_c_per_km = 6.5
max_elevation_km = 4.5             # elevation=1.0 corresponds to this many km above sea level
temp_noise_amplitude = 1.5         # small regional variation, °C

# Precipitation pipeline: prevailing winds sweep moisture from upwind ocean
# to land, losing moisture per km of land fetch and depositing extra on
# uphill (orographic uplift).
precip_base = 1600.0               # mm/year (baseline floor over land = 0.10 * this)
precip_pickup_per_ocean_km = 120.0 # mm of moisture absorbed per km of warm ocean fetch
precip_loss_per_km = 0.015         # fractional deposition rate per km of land traversal — e-folding distance ~65 km of land (was 0.066 → 15 km, which dried continental interiors below realistic ~400–600 mm)
precip_orographic_coef = 3500.0    # mm per unit dh/dx uphill
precip_noise_amplitude = 180.0
wind_reach_km = 1000.0             # cap on upwind path length integrated per hex
# Wind pattern: 3 latitude bands per hemisphere (trade easterlies → westerlies
# → polar easterlies). Direction is now continuous in cartesian space and
# perturbed per-hex; the three bands set the *base* direction only.

# --- Per-hex deviations from pure zonal flow (annual mean) ---
# Perlin jitter — spatially-coherent random perturbation of wind direction
# so moisture paths aren't perfect horizontal stripes. 15° matches the
# typical envelope of synoptic-scale storm-track meanders.
wind_jitter_amplitude_deg = 15.0
wind_jitter_wavelength_km = 600.0
# Sea breeze — annual-mean onshore wind near coasts, decays linearly with
# distance to the nearest sea. Strength 0..1 weights the onshore component
# against the zonal component before renormalisation.
sea_breeze_strength = 0.6
sea_breeze_reach_km = 200.0
# Multi-path sampling — per target hex, average the moisture sweep over N
# directions spread evenly across ±spread degrees around the base wind.
# Captures the variability that real climates have ("the wind isn't always
# exactly from that direction") without simulating individual storm tracks.
wind_path_samples = 5
wind_path_spread_deg = 25.0
# Spatial smoothing of the final precipitation field. Each pass averages
# each land hex with its land neighbors (1/7 weight each, self + 6
# neighbors). 0 = off; 2 cleans up hex-scale granularity without
# washing out the rain-shadow / orographic signal.
precip_smoothing_passes = 2

[worldgen.hydrology]
# Sink-fill + D6 flow accumulation. Rivers carve where accumulated drainage
# exceeds the threshold. Lakes form where sinks were filled.
river_drainage_threshold_km2 = 1300.0  # min upstream drainage area to mark as river
lake_min_depth = 0.03                  # min fill depth to be a lake (else marsh)
river_carve_amount = 0.04              # how much rivers lower elevation visually

[worldgen.biome]
# Whittaker classification rules at sea-level temperature.
# Elevation overrides apply above the thresholds below.
elevation_hills_threshold = 0.78     # base-elev quantile above which a tile becomes hills
elevation_mountain_threshold = 0.90
elevation_snow_threshold = 0.94
# Temperature thresholds (°C) for biome bands:
tundra_max_temp_c = -2.0
taiga_max_temp_c = 8.0
temperate_max_temp_c = 22.0
# Precipitation thresholds (mm/yr) — used together with temperature to assign biome:
desert_max_precip = 200.0
grassland_max_precip = 600.0
forest_max_precip = 1200.0
# Threshold below which a cool-band hex is tundra rather than taiga (separate
# from desert_max_precip so cool zones can be sparsely wooded at modest precip):
cool_band_dry_threshold = 150.0
# Above forest_max_precip → jungle (in warm zones) or temperate_forest (in cool zones)


[worldgen.tectonics]
# Time-stepped plate-tectonics simulation. Runs automatically when
# `mask_mode = "plates"` is active. The plates layer (above) seeds the t=0
# state — plate positions, types, and motion vectors — and this section
# controls how those plates evolve over geological time.
#
# Each tick advances every plate by velocity × dt_myr, recomputes per-hex
# overlap, resolves collisions (subduction or continental folding), spawns
# fresh oceanic crust at divergent gaps, and ages all existing crust.
# After n_ticks the final lithosphere column at each hex is converted to a
# signed elevation (km) by:
#
#   continental:  e = (thickness - reference) × isostasy_factor
#   oceanic:      e = -ridge_depth - subsidence_rate × √age_myr   (capped)
#
# That elevation is then normalized via [worldgen.climate] max_elevation_km
# and fed to the elevation layer as the macro baseline; fBm/ridged noise
# becomes small-scale detail on top (controlled by tectonic_blend_weight).

n_ticks = 100                            # geological ticks (100 × 2 Myr = 200 Myr)
dt_myr = 2.0                             # Myr per tick

# Sea level threshold (km, signed). Used by plate-interaction logic to
# decide ocean-floor vs land character of a column. Also subtracted from
# the lithosphere baseline before normalization, so this value becomes 0
# in the normalized elevation field.
sea_level_km = 0.0

# Multiplier applied to each plate's unit motion vector to get physical
# velocity (km/Myr). Real Earth plates drift at ~30–100 km/Myr; here we use
# a faster value so 200 Myr is enough to see substantial rearrangement.
plate_speed_kmpy = 60.0

# Initial column thicknesses (km). Continental crust nominally 30–40 km;
# oceanic crust 5–10 km. These are starting values — collisions thicken
# them over time, erosion thins them.
continental_thickness_km = 35.0
oceanic_thickness_km = 7.0
# Thickness for new continental crust spawned at divergent gaps when the
# nearest plate is itself continental — a rift-valley / failed-rift basin
# rather than a fake oceanic basin. 28 km with isostasy_factor 0.15 puts
# the column at ~−1 km elevation (East-African-Rift / Dead-Sea analogue).
rift_thickness_km = 33.0

# Ocean floor depth via half-space cooling. Earth: ridge ≈ 2.5 km below
# sea level, rate ≈ 0.35 km per √Myr, abyssal plains cap at ≈ 6 km.
ridge_depth_km = 2.5
ridge_subsidence_rate = 0.35              # km per √Myr
max_ocean_depth_km = 6.0                  # cap on subsidence

# Continental isostasy: elevation = (thickness - reference) × factor.
# A 35-km column sits at sea level; +10 km of thickness gives +1.5 km of
# elevation with factor 0.15 (a typical Tibetan-style continental rise).
continental_reference_thickness_km = 35.0
continental_isostasy_factor = 0.15

# Collision response per tick that two plates overlap at a hex:
#   - Continental-on-continental: transfer `folding_ratio` of smaller
#     plate's thickness to larger; both gain orogeny uplift.
#   - Either side oceanic: subduct the lower-buoyancy column; survivor
#     gains arc uplift.
orogeny_uplift_per_overlap_km = 0.08      # mountain building per overlap event
folding_ratio = 0.05                      # fraction of smaller-plate mass folded over
subduction_arc_uplift_km = 0.04           # volcanic arc thickening per subduction

# Erosion is a placeholder PlaTec-style blur applied every N ticks: each
# continental column blends a fraction toward its plate-local neighbors'
# mean thickness. Submerged crust is not eroded. Set period=0 to disable.
erosion_period = 10
erosion_strength = 0.05

# Boundary-warp post-processing. Each crust-type boundary hex gets a Perlin
# noise sample; with probability set by `boundary_warp_strength`, the hex
# is flipped to a different-type neighbour's column. This breaks the
# integer-hex grid alignment left by rigid plate-stamp translation, so
# coastlines look wavy (bays/headlands) instead of straight rectangular
# edges. Set strength=0 to disable.
boundary_warp_strength = 0.40         # 0..1; fraction of boundary hexes to flip
boundary_warp_wavelength_km = 80.0    # Perlin wavelength; smaller = chunkier

# Capture a snapshot of plate ownership + crust type every N ticks so the
# drift can be played back as an animation (drift.gif in the export folder).
# 0 disables. 1 = every tick (101 frames at default n_ticks=100; smoothest
# drift because per-frame hex displacement is sub-hex). Larger values shrink
# the GIF but make plate motion look like teleporting.
snapshot_period_ticks = 1

[worldgen.ocean]
# Ocean currents (Tier 2 climate): each connected ocean basin is split by
# hemisphere into one or two gyres, each rotating clockwise in the northern
# hemisphere and counter-clockwise in the southern (Coriolis-driven). Per
# ocean hex, the current direction is the tangent around the gyre centre;
# the temperature anomaly is the planet's latitudinal temperature at the
# point ``current_persistence_km`` upstream, minus the local lat temperature,
# scaled by ``current_anomaly_strength``. This single-pass formula gives
# warm western-boundary currents (Gulf Stream, Kuroshio) and cold eastern-
# boundary currents (California, Humboldt, Canary).
#
# Coastal land hexes inherit a fraction of the adjacent ocean's anomaly,
# decaying with distance inland. Continentality scales the precipitation
# floor by exp(-distance_to_ocean_km / continentality_dry_scale_km), drying
# deep continental interiors.
#
# Annual-mean snapshot — no seasonality.

current_persistence_km = 2000.0         # ~Gulf Stream traversal distance
current_anomaly_strength = 0.5          # 0..1; fraction of source-temp anomaly
max_current_anomaly_c = 8.0             # cap on |anomaly|, °C

coastal_pickup_fraction = 0.6           # at the coast itself, 0..1
coastal_decay_km = 300.0                # e-folding distance into the interior

continentality_dry_scale_km = 1500.0    # ~37% of precip floor at 1500 km inland
