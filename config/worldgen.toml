[worldgen.hydrology]
# Sink-fill + D6 flow accumulation. Rivers carve where accumulated drainage
# exceeds the threshold. Lakes form where sinks were filled.
river_drainage_threshold_km2 = 1300.0  # min upstream drainage area to mark as river
lake_min_depth = 0.03                  # min fill depth to be a lake (else marsh)
river_carve_amount = 0.04              # how much rivers lower elevation visually

[worldgen.biome]
# Whittaker classification rules at sea-level temperature.
# Elevation overrides apply above the thresholds below.
elevation_hills_threshold = 0.78     # base-elev quantile above which a tile becomes hills
elevation_mountain_threshold = 0.90
elevation_snow_threshold = 0.94
# Temperature thresholds (°C) for biome bands:
tundra_max_temp_c = -2.0
taiga_max_temp_c = 8.0
temperate_max_temp_c = 22.0
# Precipitation thresholds (mm/yr) — used together with temperature to assign biome:
desert_max_precip = 200.0
grassland_max_precip = 600.0
forest_max_precip = 1200.0
# Threshold below which a cool-band hex is tundra rather than taiga (separate
# from desert_max_precip so cool zones can be sparsely wooded at modest precip):
cool_band_dry_threshold = 150.0
# Above forest_max_precip → jungle (in warm zones) or temperate_forest (in cool zones)

