# =========================================================================
# Worldgen parameters — terrain generation pipeline.
#
# Kept separate from default.toml so the world-generation tuning surface
# (elevation, climate, hydrology, crops, resources, biome thresholds) can
# be swapped or experimented with without touching simulation-engine config.
# Loaded automatically alongside default.toml by `SimConfig.from_toml`.
#
# Layered pipeline (each layer is a pure function of earlier layers' outputs
# plus a seeded child-RNG keyed by the layer name — adding a new layer or
# entry does not reshuffle existing seeds):
#   L1 elevation → L2 sea → L3 climate → L4 precip → L5 hydrology →
#   L6 biome → L7 resources & crops
#
# Physical-unit scaling: scale-dependent parameters are stored in physical
# units (km, km², mm) and converted via `hex_size_km` — the same physical
# world looks identical at any chosen hex resolution.
# =========================================================================

[worldgen]
# Each hex represents a piece of land of this physical size.
# Scale-dependent parameters below (wavelengths, ocean pickup, river
# threshold, etc.) are given in physical units and converted to hex units
# at runtime — so changing hex_size_km automatically rescales noise
# frequencies, river thresholds, wind reach, and precipitation rates.
# Generated worlds will look the same at any chosen resolution.
hex_size_km = 5.0

[worldgen.elevation]
# fBm + ridged noise heightmap, with radial falloff for an island world.
# Sea level is chosen by quantile so a target fraction of hexes is land.
land_fraction = 0.55              # target fraction of hexes that are land
feature_wavelength_km = 250.0     # dominant elevation feature length scale
noise_octaves = 6
noise_lacunarity = 2.0
noise_persistence = 0.5
warp_strength_km = 25.0           # domain-warp magnitude in km
warp_wavelength_km = 333.0        # wavelength of the warp field in km
ridge_octaves = 5
ridge_amplitude = 0.85             # how much ridges contribute to elevation
ridge_threshold = 0.10             # ridges only above this base-elevation quantile
falloff_strength = 0.55            # radial falloff: edges trend to ocean
falloff_power = 2.2
falloff_inner_fraction = 0.45      # fraction of radius before falloff begins

[worldgen.climate]
# Latitude → temperature, then lapse rate by elevation.
# Latitude is taken as r-coordinate / radius (range [-1, 1]).
equator_temp_c = 28.0
polar_temp_c = -22.0
lapse_rate_c_per_km = 6.5
max_elevation_km = 4.5             # elevation=1.0 corresponds to this many km above sea level
temp_noise_amplitude = 1.5         # small regional variation, °C

# Precipitation pipeline: prevailing winds sweep moisture from upwind ocean
# to land, losing moisture per km of land fetch and depositing extra on
# uphill (orographic uplift).
precip_base = 1600.0               # mm/year (baseline floor over land = 0.10 * this)
precip_pickup_per_ocean_km = 120.0 # mm of moisture absorbed per km of warm ocean fetch
precip_loss_per_km = 0.066         # fractional deposition rate per km of land traversal
precip_orographic_coef = 3500.0    # mm per unit dh/dx uphill
precip_noise_amplitude = 180.0
wind_reach_km = 1000.0             # cap on upwind path length integrated per hex
# Wind pattern: 3 latitude bands per hemisphere (trade easterlies → westerlies
# → polar easterlies). Wind vectors are in axial-space, normalized.

# -------------------------------------------------------------------------
# Crops — agricultural suitability envelopes (FAO Ecocrop-style).
#
# Each crop has trapezoidal tolerance over temperature (°C) and annual
# precipitation (mm). Suitability is the product of trapezoid scores ×
# biome multiplier × (1 + river/coast bonuses). Biomes not listed → 0.
#
# Temperature points: temp_abs_min ≤ temp_opt_min ≤ temp_opt_max ≤ temp_abs_max
# Same shape for precipitation.
#
# - irrigation_replaces_rain_mm: if > 0, river-adjacent hexes get this many
#   mm added to their effective rainfall, enabling crops like rice in
#   otherwise-dry tropical valleys.
# -------------------------------------------------------------------------

[worldgen.crops.wheat]
temp_abs_min = 0.0
temp_opt_min = 15.0
temp_opt_max = 20.0
temp_abs_max = 30.0
precip_abs_min = 250.0
precip_opt_min = 500.0
precip_opt_max = 900.0
precip_abs_max = 1600.0
elev_max = 0.50
river_bonus = 0.15
river_adjacent_bonus = 0.05
coast_bonus = 0.0
irrigation_replaces_rain_mm = 0.0
[worldgen.crops.wheat.biome_compatibility]
plains = 1.0
grassland = 1.0
hills = 0.85
savanna = 0.55
temperate_forest = 0.45
taiga = 0.20
desert = 0.10

