# =========================================================================
# Worldgen pipeline parameters (elevation, climate, hydrology, biome).
# Each layer is a pure function of earlier outputs + a seeded child-RNG
# keyed by layer name. Scale-dependent values are in physical units
# (km, km², mm) and converted via hex_size_km, so a world looks identical
# at any hex resolution.
# Pipeline: L1 elevation → L2 sea → L3 climate → L4 precip → L5 hydrology → L6 biome
# =========================================================================

[worldgen]
hex_size_km = 5.0                    # physical size per hex; rescales all physical-unit knobs

# Path (relative to this file) to the standalone tectonic_sim config —
# the sole source of tectonic-physics tunables.
tectonic_sim_config = "tectonic_sim.toml"

[worldgen.world]
# Rectangular map footprint (km). Hex set = every flat-top hex centre in
# [-W/2, W/2] × [-H/2, H/2]. Width = E-W (constant latitude); height = N-S
# (latitude varies; see climate map_lat_min/max).
width_km = 2500.0
height_km = 2500.0

# =========================================================================
# Elevation. Macro structure comes from the tectonics sim (tectonic_sim.toml);
# fBm/ridged noise adds detail blended at tectonic_blend_weight.
# =========================================================================

[worldgen.elevation]
feature_wavelength_km = 260.0
noise_octaves = 6
noise_lacunarity = 2.0
noise_persistence = 0.5
warp_strength_km = 25.0
warp_wavelength_km = 333.0
ridge_octaves = 5
ridge_amplitude = 0.70
ridge_threshold = 0.10
tectonic_blend_weight = 1.0          # 1 = pure tectonics, 0 = pure noise

[worldgen.climate]
# Latitude window the map's N-S axis covers: y=-H/2 (north) → map_lat_max,
# y=+H/2 (south) → map_lat_min. Independent of width/hex_size. (-90, 90) =
# pole-to-pole.
map_lat_min = -30.0
map_lat_max = 60.0

# Planet climate anchors (°C at lat 0° and ±90°); map samples a slice via the
# lat window. Lapse applied per km of elevation.
equator_temp_c = 28.0
polar_temp_c = -22.0
lapse_rate_c_per_km = 6.5
max_elevation_km = 4.5               # km above sea level at elevation = 1.0
temp_noise_amplitude = 1.5           # regional variation, °C

# Precipitation: prevailing winds carry ocean moisture onto land, losing it
# per km of land fetch and depositing extra uphill (orographic).
precip_base = 1600.0                 # mm/yr (land floor = 0.10 × this)
precip_pickup_per_ocean_km = 120.0   # mm absorbed per km of warm-ocean fetch
precip_loss_per_km = 0.015           # fractional deposition per km land (~65 km e-folding)
precip_orographic_coef = 3500.0      # mm per unit uphill dh/dx
precip_noise_amplitude = 180.0
wind_reach_km = 1000.0               # cap on upwind path length per hex

# --- Per-hex deviations from zonal flow (annual mean) ---
# Perlin jitter so moisture paths aren't perfect stripes (~15° = synoptic meander).
wind_jitter_amplitude_deg = 15.0
wind_jitter_wavelength_km = 600.0
# Sea breeze: annual-mean onshore wind near coasts, decaying inland. Strength 0..1.
sea_breeze_strength = 0.6
sea_breeze_reach_km = 200.0
# Multi-path sampling: average the sweep over N directions across ±spread°.
wind_path_samples = 5
wind_path_spread_deg = 25.0
precip_smoothing_passes = 2          # final-field smoothing (self + 6 land neighbours); 0 = off

[worldgen.hydrology]
# Sink-fill + D6 flow accumulation. Rivers where drainage exceeds threshold;
# lakes where sinks were filled.
river_drainage_threshold_km2 = 1300.0
lake_min_depth = 0.03                # min fill depth for lake (else marsh)
river_carve_amount = 0.04            # visual elevation lowering along rivers

[worldgen.biome]
# Whittaker classification at sea-level temperature; elevation overrides above.
elevation_hills_threshold = 0.78     # base-elev quantile → hills
elevation_mountain_threshold = 0.90
elevation_snow_threshold = 0.94
# Temperature bands (°C):
tundra_max_temp_c = -2.0
taiga_max_temp_c = 8.0
temperate_max_temp_c = 22.0
# Precipitation bands (mm/yr):
desert_max_precip = 200.0
grassland_max_precip = 600.0
forest_max_precip = 1200.0
cool_band_dry_threshold = 150.0      # cool-band tundra vs taiga cutoff
# Above forest_max_precip → jungle (warm) or temperate_forest (cool).

[worldgen.ocean]
# Ocean currents (Tier 2): each basin split by hemisphere into gyres (CW north,
# CCW south). Per ocean hex, direction = gyre tangent; temp anomaly = upstream
# lat-temp minus local, scaled — yields warm western / cold eastern boundary
# currents. Coastal land inherits a decaying fraction; continentality dries
# deep interiors. Annual-mean, no seasonality.
current_persistence_km = 2000.0      # upstream sampling distance
current_anomaly_strength = 0.5       # 0..1 fraction of source anomaly
max_current_anomaly_c = 8.0          # cap on |anomaly|, °C
coastal_pickup_fraction = 0.6        # anomaly fraction at the coast, 0..1
coastal_decay_km = 300.0             # e-folding distance inland
continentality_dry_scale_km = 1500.0 # ~37% of precip floor at this distance inland
