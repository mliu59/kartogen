[project]
name = "worldgen"
version = "0.1.0"
description = "Deterministic, layered hex-grid world generator (elevation, climate, hydrology, biomes, crops, resources)."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
preview = [
    "Pillow>=10.0",
]
dev = [
    "pytest>=8.0",
    "mypy>=1.10",
    "ruff>=0.4",
    "Pillow>=10.0",
]

[tool.setuptools.packages.find]
include = ["worldgen*"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["worldgen", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
packages = ["worldgen"]

[tool.pytest.ini_options]
testpaths = ["tests"]
