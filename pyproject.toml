[project]
name = "agent-based-macro-history-sim"
version = "0.1.0"
description = "Agent-based macro-history simulator"
requires-python = ">=3.11"
dependencies = [
    "structlog>=24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "mypy>=1.10",
    "ruff>=0.4",
]

[tool.setuptools.packages.find]
include = ["sim*"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["sim", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
packages = ["sim"]

[tool.pytest.ini_options]
testpaths = ["tests"]
